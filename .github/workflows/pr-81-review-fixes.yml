name: PR 81 review fixes

on:
  push:
    branches:
      - "feature/che-322-ops-edge-artifact-refresh-postgres-provision-upstash-cache"

permissions:
  contents: write

jobs:
  apply-review-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/che-322-ops-edge-artifact-refresh-postgres-provision-upstash-cache
          fetch-depth: 0

      - name: Apply targeted review fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          def replace_many(path: str, replacements: dict[str, str]) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              for old, new in replacements.items():
                  if old not in text:
                      raise SystemExit(f"{path}: missing expected text: {old!r}")
                  text = text.replace(old, new)
              p.write_text(text, encoding="utf-8")

          api_path = "src/kater/api.py"
          replace_once(
              api_path,
              '''    rows = query_events(limit=limit, name=name or None, since=since)
              if success_raw is not None:
                  wanted = success_raw.lower() == "true"
                  rows = [r for r in rows if bool(r.get("success")) is wanted]
              events = []
              ''',
              '''    # Fetch the bounded telemetry window in chronological order, apply
              # filters, then return the newest matching rows first for the dashboard.
              rows = query_events(limit=0, name=name or None, since=since)
              if success_raw is not None:
                  wanted = success_raw.lower() == "true"
                  rows = [r for r in rows if bool(r.get("success")) is wanted]
              rows = list(reversed(rows[-limit:]))
              events = []
              ''',
          )

          old_backends = '''@route("GET", "/api/backends")
          def _backends(_: Request) -> Response:
              overview = status_overview().get("servers", {})
              per_server: dict[str, dict[str, bool]] = {}
              for source in __import__("kater.profiles", fromlist=["all_tool_sources"]).all_tool_sources():
                  if source.transport == "native":
                      continue
                  import os

                  env_present = all(os.environ.get(v) for v in source.env)
                  per_server[source.name] = {
                      "enabled": load_settings().is_server_enabled(source.name, default=True),
                      "configured": bool(env_present),
                      "missing_env": not env_present,
                  }
              result = []
              try:
                  proxy = get_proxy()
                  statuses = proxy.statuses()
              except Exception:
                  statuses = []
              for status in statuses:
                  d = status.to_dict()
                  extra = per_server.get(d["name"], {})
                  d["enabled"] = extra.get("enabled")
                  d["configured"] = extra.get("configured")
                  d["missing_env"] = extra.get("missing_env")
                  result.append(d)
              return Response.json(
                  200,
                  {
                      "servers": result,
                      "totals": {
                          "enabled": overview.get("enabled", 0),
                          "disabled": overview.get("disabled", 0),
                          "configured": overview.get("configured", 0),
                          "missing_env": overview.get("missing_env", 0),
                      },
                  },
              )
          '''
          new_backends = '''@route("GET", "/api/backends")
          def _backends(
              _: Request,
              proxy_factory: Callable[[], Any] = get_proxy,
          ) -> Response:
              overview = status_overview().get("servers", {})
              totals = {
                  "enabled": overview.get("enabled", 0),
                  "disabled": overview.get("disabled", 0),
                  "configured": overview.get("configured", 0),
                  "missing_env": overview.get("missing_env", 0),
              }
              per_server: dict[str, dict[str, bool]] = {}
              settings = load_settings()
              for source in __import__("kater.profiles", fromlist=["all_tool_sources"]).all_tool_sources():
                  if source.transport == "native":
                      continue
                  env_present = all(os.environ.get(v) for v in source.env)
                  per_server[source.name] = {
                      "enabled": settings.is_server_enabled(source.name, default=True),
                      "configured": bool(env_present),
                      "missing_env": not env_present,
                  }
              try:
                  statuses = proxy_factory().statuses()
              except Exception as exc:
                  _log.exception("failed to collect backend statuses")
                  return Response.json(
                      503,
                      {
                          "error": "backend_status_unavailable",
                          "message": "Backend status collection failed; check gateway logs and retry.",
                          "detail": str(exc),
                          "backends": [],
                          "servers": [],
                          "totals": totals,
                      },
                  )
              result = []
              for status in statuses:
                  d = status.to_dict()
                  extra = per_server.get(d["name"], {})
                  d["enabled"] = extra.get("enabled")
                  d["configured"] = extra.get("configured")
                  d["missing_env"] = extra.get("missing_env")
                  result.append(d)
              return Response.json(
                  200,
                  {
                      "backends": result,
                      # Keep the previous key for API consumers while the dashboard
                      # and new clients use the explicit `backends` contract.
                      "servers": result,
                      "totals": totals,
                  },
              )
          '''
          replace_once(api_path, old_backends, new_backends)

          dashboard_path = "src/kater/web/dashboard.py"
          replace_once(
              dashboard_path,
              '''function trackedRAF(fn) {
            if (typeof requestAnimationFrame !== 'function') return 0;
            const id = requestAnimationFrame((ts) => { rafFrames.delete(id); fn(ts); });
            rafFrames.add(id);
            return id;
          }
            const id = setTimeout(() => { timers.delete(id); fn(); }, ms);
            timers.add(id);
            return id;
          }
          ''',
              '''function trackedRAF(fn) {
            if (typeof requestAnimationFrame !== 'function') return 0;
            const id = requestAnimationFrame((ts) => { rafFrames.delete(id); fn(ts); });
            rafFrames.add(id);
            return id;
          }
          function trackedTimeout(fn, ms) {
            const id = setTimeout(() => { timers.delete(id); fn(); }, ms);
            timers.add(id);
            return id;
          }
          ''',
          )
          replace_once(dashboard_path, "  const url = '/oauth/authorize'", "  const url = '/authorize'")
          replace_once(
              dashboard_path,
              "  const list = Array.isArray(data) ? data : (data.backends || []);",
              "  const list = Array.isArray(data) ? data : (data.backends || data.servers || []);",
          )
          replace_once(
              dashboard_path,
              '''      data-confirm-body="Enable this server? It will be included in the active profile."
                onclick="detailToggle(true)">Enable</button>''',
              '''      data-confirm-body="Enable this server? It will be included in the active profile.">Enable</button>''',
          )
          replace_once(
              dashboard_path,
              '''      data-confirm-body="Disable this server? Its tools will be removed from the active profile."
                onclick="detailToggle(false)">Disable</button>''',
              '''      data-confirm-body="Disable this server? Its tools will be removed from the active profile.">Disable</button>''',
          )
          replace_once(
              dashboard_path,
              "  $('detail-name').textContent = server.name;",
              '''  $('detail-name').textContent = server.name;
            ['confirm-server-enable', 'confirm-server-disable'].forEach((id) => {
              const button = $(id);
              if (button) button.dataset.name = server.name;
            });''',
          )
          replace_once(
              dashboard_path,
              '''  const titles = {
              enable: 'ENABLE SERVER', disable: 'DISABLE SERVER',
              'save-credentials': 'SAVE CREDENTIALS',
            };
            const bodies = {
              enable: 'Enabling "' + (name || '') + '" opens a live tool connection. Confirm?',
              disable: 'Disabling "' + (name || '') + '" cuts an active tool connection. Confirm?',
              'save-credentials': 'Saving credentials writes secrets to storage. Confirm?',
            };
            const t = $('confirm-title'), b = $('confirm-body');
            if (t) t.textContent = titles[action] || 'CONFIRM';
            if (b) b.textContent = bodies[action] || '';
          ''',
              '''  const titles = {
              enable: 'Enable server', disable: 'Disable server',
              'save-credentials': 'Save credentials',
            };
            const labels = {
              enable: 'Enable server', disable: 'Disable server',
              'save-credentials': 'Save credentials',
            };
            const bodies = {
              enable: 'Enabling "' + (name || '') + '" opens a live tool connection.',
              disable: 'Disabling "' + (name || '') + '" cuts an active tool connection.',
              'save-credentials': 'Saving credentials writes secrets to storage.',
            };
            const t = $('confirm-title'), b = $('confirm-body');
            if (t) t.textContent = titles[action] || 'Confirm action';
            if (b) b.textContent = bodies[action] || '';
            if (confirmCtx.ok) confirmCtx.ok.textContent = labels[action] || 'Continue';
          ''',
          )
          replace_once(
              dashboard_path,
              '''  const dlg = $('confirm');
            if (!dlg) return;
            const titles = {''',
              '''  const dlg = $('confirm');
            if (!dlg) return;
            dlg.hidden = false;
            const titles = {''',
          )
          replace_once(
              dashboard_path,
              '''  dlg.classList.add('hidden');
            dlg.setAttribute('aria-hidden', 'true');
            confirmCtx = null;''',
              '''  dlg.classList.add('hidden');
            dlg.setAttribute('aria-hidden', 'true');
            dlg.hidden = true;
            confirmCtx = null;''',
          )

          replace_many(
              dashboard_path,
              {
                  '<span class="view-title">CONTROL PLANE</span>': '<span class="view-title">Control plane</span>',
                  '<span class="panel-title">KEY METRICS</span>': '<span class="panel-title">Key metrics</span>',
                  '<span class="panel-title">TUNNELS</span>': '<span class="panel-title">Tunnels</span>',
                  'onclick="toggleTunnel(this)">START</button>': 'onclick="toggleTunnel(this)">Start</button>',
                  '<span class="panel-title">TOPOLOGY</span>': '<span class="panel-title">Topology</span>',
                  '<span class="panel-title">LIVE TELEMETRY</span>': '<span class="panel-title">Live telemetry</span>',
                  '<span class="tag tag--accent" id="tlm-state">STREAM</span>': '<span class="tag tag--accent" id="tlm-state">Stream</span>',
                  '<span class="panel-title">BACKEND HEALTH</span>': '<span class="panel-title">Backend health</span>',
                  '<span class="panel-title">RECENT CALLS</span>': '<span class="panel-title">Recent calls</span>',
                  '<span class="view-title">SERVER CATALOG</span>': '<span class="view-title">Server catalog</span>',
                  '<span class="panel-title">REGISTRY</span>': '<span class="panel-title">Registry</span>',
                  '<span class="view-title">TOOL PERFORMANCE</span>': '<span class="view-title">Tool performance</span>',
                  '<span class="panel-title">EVALUATION INDEX</span>': '<span class="panel-title">Evaluation index</span>',
                  '<th>Tool</th><th>Calls</th><th>Success</th><th>Avg Latency</th>': '<th>Tool</th><th>Calls</th><th>Success</th><th>Avg latency</th>',
                  '<span class="view-title">DEPLOYMENT CONFIGS</span>': '<span class="view-title">Deployment configs</span>',
                  '<span class="panel-title">DEPLOY MANIFEST</span>': '<span class="panel-title">Deploy manifest</span>',
                  '<span class="view-title">SETTINGS</span>': '<span class="view-title">Settings</span>',
                  '<span class="panel-title">GATEWAY CONFIG</span>': '<span class="panel-title">Gateway config</span>',
                  '>Auth Mode</label>': '>Auth mode</label>',
                  '>Default Profile</label>': '>Default profile</label>',
                  '>CORS Origins</label>': '>CORS origins</label>',
                  '>Rate Limit / min</label>': '>Rate limit / min</label>',
                  '>Storage Backend</label>': '>Storage backend</label>',
                  '>Save Settings</button>': '>Save settings</button>',
                  '<div class="detail-label">Transport / Risk</div>': '<div class="detail-label">Transport / risk</div>',
                  '<div class="detail-label">Launch Command</div>': '<div class="detail-label">Launch command</div>',
                  'data-confirm-title="Enable Server"': 'data-confirm-title="Enable server"',
                  'data-confirm-title="Disable Server"': 'data-confirm-title="Disable server"',
                  'data-confirm-title="Save Credentials"': 'data-confirm-title="Save credentials"',
                  '<span class="confirm-title" id="confirm-title">Confirm</span>': '<span class="confirm-title" id="confirm-title">Confirm action</span>',
                  'onclick="runConfirmed()">Confirm</button>': 'onclick="runConfirmed()">Continue</button>',
                  "server.enabled ? 'ENABLED' : 'DISABLED'": "server.enabled ? 'Enabled' : 'Disabled'",
                  "telegraph('tunnel toggle failed: ' + e.message, 'err')": "telegraph('Tunnel toggle failed: ' + e.message + '. Retry; if it fails again, check the gateway logs.', 'err')",
                  "'server ' + (enabled ? 'enable' : 'disable') + ' failed: ' + e.message,": "'Server ' + (enabled ? 'enable' : 'disable') + ' failed: ' + e.message + '. Retry; if it fails again, check authentication and gateway logs.',",
                  "telegraph('save failed: ' + e.message, 'err')": "telegraph('Credential save failed: ' + e.message + '. Verify the token and storage permissions, then retry.', 'err')",
                  "telegraph('deploy config failed: ' + e.message, 'err')": "telegraph('Deploy configuration failed: ' + e.message + '. Reload the dashboard; if it persists, check /api/deploy/config.', 'err')",
                  "telegraph('clipboard blocked by browser', 'err')": "telegraph('Clipboard access was blocked. Allow clipboard access or copy the code manually.', 'err')",
                  "telegraph('clipboard unavailable', 'err')": "telegraph('Clipboard API is unavailable. Select the code and copy it manually.', 'err')",
                  "telegraph('settings load failed: ' + e.message, 'err')": "telegraph('Settings load failed: ' + e.message + '. Reload the page and verify /api/settings is reachable.', 'err')",
                  "telegraph('settings save failed: ' + e.message, 'err')": "telegraph('Settings save failed: ' + e.message + '. Check authentication and field values, then retry.', 'err')",
                  "telegraph('err: ' + e.message, 'err')": "telegraph('Command failed: ' + e.message + '. Check the command syntax and gateway logs, then retry.', 'err')",
              },
          )

          tests = Path("tests/test_pr81_review_fixes.py")
          tests.write_text(
              '''from __future__ import annotations

          import logging

          import kater.api as api
          import kater.profiles as profiles
          from kater.web import render_dashboard


          def _request(query: dict[str, list[str]] | None = None) -> api.Request:
              return api.Request(
                  method="GET",
                  path="/api/events",
                  query=query or {},
                  headers={},
                  raw_body=b"",
                  client_ip="127.0.0.1",
                  base_url="http://localhost",
              )


          def test_dashboard_javascript_helpers_and_oauth_route_are_valid():
              html = render_dashboard()
              assert "function trackedTimeout(fn, ms)" in html
              assert "const url = '/authorize'" in html
              assert "/oauth/authorize" not in html
              assert "data.backends || data.servers || []" in html


          def test_dashboard_confirm_action_uses_specific_labels():
              html = render_dashboard()
              assert "enable: 'Enable server'" in html
              assert "disable: 'Disable server'" in html
              assert "'save-credentials': 'Save credentials'" in html
              assert "confirmCtx.ok.textContent = labels[action]" in html
              assert 'onclick="runConfirmed()">Confirm</button>' not in html


          def test_dashboard_primary_copy_is_sentence_case():
              html = render_dashboard()
              for label in (
                  "CONTROL PLANE",
                  "KEY METRICS",
                  "SERVER CATALOG",
                  "TOOL PERFORMANCE",
                  "DEPLOYMENT CONFIGS",
                  "GATEWAY CONFIG",
                  "Save Settings",
              ):
                  assert label not in html


          def test_events_returns_newest_matching_rows_first(monkeypatch):
              rows = [
                  {"type": "tool_call", "name": "one", "timestamp": 1.0, "success": True},
                  {"type": "tool_call", "name": "two", "timestamp": 2.0, "success": True},
                  {"type": "tool_call", "name": "three", "timestamp": 3.0, "success": True},
              ]
              monkeypatch.setattr(api, "query_events", lambda **_: rows)
              response = api._events(_request({"limit": ["2"]}))
              assert response.status == 200
              assert [event["name"] for event in response.payload["events"]] == ["three", "two"]


          class _Status:
              def to_dict(self):
                  return {
                      "name": "github",
                      "healthy": True,
                      "tool_count": 4,
                      "latency_ms": 12,
                      "breaker_state": "closed",
                  }


          class _Proxy:
              def statuses(self):
                  return [_Status()]


          def test_backends_accepts_injected_proxy_and_returns_compatible_shape(monkeypatch):
              monkeypatch.setattr(profiles, "all_tool_sources", lambda: [])
              monkeypatch.setattr(api, "status_overview", lambda: {"servers": {"enabled": 1}})
              response = api._backends(_request(), proxy_factory=lambda: _Proxy())
              assert response.status == 200
              assert response.payload["backends"] == response.payload["servers"]
              assert response.payload["backends"][0]["name"] == "github"


          def test_backends_failure_is_observable(monkeypatch, caplog):
              class FailingProxy:
                  def statuses(self):
                      raise RuntimeError("boom")

              monkeypatch.setattr(profiles, "all_tool_sources", lambda: [])
              monkeypatch.setattr(api, "status_overview", lambda: {"servers": {}})
              with caplog.at_level(logging.ERROR):
                  response = api._backends(_request(), proxy_factory=lambda: FailingProxy())
              assert response.status == 503
              assert response.payload["error"] == "backend_status_unavailable"
              assert "failed to collect backend statuses" in caplog.text
          ''',
              encoding="utf-8",
          )
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Validate fixes
        run: |
          uv run ruff check src/kater/api.py src/kater/web/dashboard.py tests/test_pr81_review_fixes.py
          uv run pytest tests/test_dashboard.py tests/test_pr81_review_fixes.py -q

      - name: Commit validated fixes and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/pr-81-review-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/kater/api.py src/kater/web/dashboard.py tests/test_pr81_review_fixes.py .github/workflows/pr-81-review-fixes.yml
          git commit -m "fix: address PR 81 review findings"
          git push origin HEAD:feature/che-322-ops-edge-artifact-refresh-postgres-provision-upstash-cache
