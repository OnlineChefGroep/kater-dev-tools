name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so force-pushes don't queue jobs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type-check with mypy
        run: uv run mypy

      - name: Test with pytest
        run: uv run pytest -v

      - name: Smoke test
        run: ./scripts/smoke.sh

  security-audit:
    runs-on: ubuntu-latest
    # Scan resolved third-party dependencies for known CVEs on every push/PR.
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --dev

      - name: Export audit requirements
        run: uv run python -m pip freeze --exclude-editable > requirements-audit.txt

      - name: Audit dependencies for vulnerabilities
        run: uvx pip-audit --strict -r requirements-audit.txt
