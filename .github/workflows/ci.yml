name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type-check with mypy
        run: uv run mypy

      - name: Test with pytest
        run: uv run pytest -q --tb=short -ra

      - name: Smoke test
        run: ./scripts/smoke.sh

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Export runtime audit requirements
        run: uv export --format requirements-txt --no-dev --no-hashes --no-emit-project > requirements-audit.txt

      - name: Audit runtime dependencies
        run: uvx pip-audit --strict -r requirements-audit.txt
