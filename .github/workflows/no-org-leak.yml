name: No org leak

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Full-history scan on a controlled cadence (not per-PR).
    - cron: "27 4 * * *"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  no-org-leak:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          # Full history only for scheduled/release full scans; PRs diff-scan.
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}

      - name: Fetch base ref for PR diff-scan
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth 1 origin "${{ github.event.pull_request.base.ref }}"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Org-leak guard (explicit allowlist script)
        run: uv run python scripts/no_org_leak.py --base "${{ github.event_name == 'pull_request' && 'origin/main' || '' }}"

      - name: Install gitleaks (checksum-validated)
        run: |
          set -euo pipefail
          VER=8.24.2
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          curl -sSfL "$URL" -o gitleaks.tar.gz
          echo "fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e  gitleaks.tar.gz" > gitleaks.sha256
          sha256sum -c gitleaks.sha256
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks diff scan (PR only)
        if: github.event_name == 'pull_request'
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner

      - name: Gitleaks full-history scan (scheduled/release/push)
        if: github.event_name != 'pull_request'
        run: gitleaks detect --source . --log-opts="--all" --config .gitleaks.toml --redact --no-banner
