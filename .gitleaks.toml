title = "kater-dev-tools gitleaks config"

[[rules]]
id = "kater-env-secrets"
title = "Kater secrets"
description = "Project-specific KATER_* env-var names assigned a secret-looking value"
regex = '''(?i)(KATER_ADMIN_KEY|KATER_REGISTRATION_TOKEN|KATER_DASHBOARD_KEY|KATER_OAUTH_CLIENT_SECRET|KATER_PROXY_KEY)\s*[=:]\s*['"]?[A-Za-z0-9_\-]{16,}'''
keywords = [
  "KATER_ADMIN_KEY",
  "KATER_REGISTRATION_TOKEN",
  "KATER_DASHBOARD_KEY",
  "KATER_OAUTH_CLIENT_SECRET",
  "KATER_PROXY_KEY",
]

[[rules.allowlists]]
description = "Test fixtures, e2e scripts and the .env.example template ship placeholder values, not real secrets"
paths = [
  '''^tests/''',
  '''^scripts/e2e-mcp\.sh$''',
  '''^\.env\.example$''',
]

[allowlist]
description = "RFC 6455 WebSocket handshake test nonces are not secrets"
paths = [
  '''scripts/e2e-mcp.sh''',
  '''tests/test_hardening.py''',
]
