services:
  kater:
    build:
      context: .
    image: kater-dev-tools:local
    restart: unless-stopped
    command: >
      uvx --from mcp-proxy==0.8.* mcp-proxy
      --host 0.0.0.0 --port 9090
      -- uv run kater mcp serve --profile ${KATER_PROFILE:-core}
    env_file:
      - path: .env
        required: false
    environment:
      KATER_PROFILE: ${KATER_PROFILE:-core}
    ports:
      - "9090:9090"
    volumes:
      - ./config:/app/config:ro
