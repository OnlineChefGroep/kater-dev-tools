services:
  kater:
    build:
      context: .
    image: kater-dev-tools:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      KATER_PROFILE: ${KATER_PROFILE:-core}
      # Local default: no auth. Set KATER_PUBLIC=1 for tunnel/public exposure.
      KATER_PUBLIC: ${KATER_PUBLIC:-0}
      KATER_AUTH_MODE: ${KATER_AUTH_MODE:-}
      KATER_API_KEY: ${KATER_API_KEY:-}
      KATER_RATE_LIMIT: ${KATER_RATE_LIMIT:-}
      KATER_CORS_ORIGINS: ${KATER_CORS_ORIGINS:-}
      KATER_HOST: ${KATER_HOST:-127.0.0.1}
      KATER_API_PORT: "9091"
      KATER_MCP_PORT: "9090"
    ports:
      - "${MCP_PORT:-9090}:9090"
      - "${API_PORT:-9091}:9091"
      - "${WS_PORT:-9092}:9092"
    volumes:
      - ./config:/app/config:ro
      - kater_data:/app/.kater
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9091/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  kater_data:
