services:
  kater:
    build:
      context: .
    image: kater-dev-tools:latest
    restart: unless-stopped
    command: ["kater", "serve", "--host", "0.0.0.0"]
    env_file:
      - path: .env
        required: false
    environment:
      KATER_PROFILE: ${KATER_PROFILE:-core}
      # Published ports are public-deploy shaped by default. Override the origin
      # with your real dashboard/API origin before exposing outside localhost.
      KATER_PUBLIC: ${KATER_PUBLIC:-1}
      KATER_AUTH_MODE: ${KATER_AUTH_MODE:-oauth}
      KATER_API_KEY: ${KATER_API_KEY:-}
      KATER_RATE_LIMIT: ${KATER_RATE_LIMIT:-60}
      KATER_CORS_ORIGINS: ${KATER_CORS_ORIGINS:-https://kater.example.com}
      KATER_HOST: ${KATER_HOST:-0.0.0.0}
      KATER_API_PORT: "9091"
      KATER_MCP_PORT: "9090"
      KATER_WS_PORT: "9092"
    ports:
      - "${MCP_PORT:-9090}:9090"
      - "${API_PORT:-9091}:9091"
      - "${WS_PORT:-9092}:9092"
    volumes:
      - ./config:/app/config:ro
      - kater_data:/app/.kater
    # In-RAM writable /tmp without persisting it.
    tmpfs:
      - /tmp
    # Drop all Linux capabilities and forbid privilege escalation.
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    # Read-only root FS; named volume + tmpfs cover the writable paths.
    read_only: true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9091/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  kater_data:
